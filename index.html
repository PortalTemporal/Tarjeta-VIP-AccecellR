<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Ti ❤️</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
font-family: 'Segoe UI', sans-serif;
overflow:hidden;
}

h1{
font-size:60px;
color:white;
text-align:center;
text-shadow:0 5px 15px rgba(0,0,0,0.3);
animation:latido 1.5s infinite;
}

@keyframes latido{
0%{transform:scale(1);}
50%{transform:scale(1.1);}
100%{transform:scale(1);}
}

.sub{
font-size:24px;
color:white;
margin-top:10px;
}

.roses{
position:absolute;
width:100%;
height:100%;
pointer-events:none;
}

.rose{
position:absolute;
font-size:28px;
animation:flotar 8s linear infinite;
}

@keyframes flotar{
0%{
transform:translateY(100vh);
opacity:0;
}
10%{
opacity:1;
}
100%{
transform:translateY(-10vh);
opacity:0;
}
}

.heart{
position:absolute;
font-size:24px;
animation:corazones 6s linear infinite;
}

@keyframes corazones{
0%{
transform:translateY(100vh) scale(0.5);
opacity:0;
}
20%{
opacity:1;
}
100%{
transform:translateY(-10vh) scale(1.2);
opacity:0;
}
}

</style>
</head>

<body>

<h1>🌹 Diana Michelle ¿Quiéres ser mi esposa?  🌹</h1>
<div class="sub">Eres lo más hermoso de mi vida y quiero que estes toda la vida junto a mi ❤️</div>

<div class="roses" id="roses"></div>

<script>

const container = document.getElementById("roses");

function crearElemento(simbolo,clase){
const el = document.createElement("div");
el.className = clase;
el.innerHTML = simbolo;

el.style.left = Math.random()*100 + "vw";
el.style.animationDuration = (5 + Math.random()*5) + "s";

container.appendChild(el);

setTimeout(()=>{
el.remove();
},8000);
}

setInterval(()=>{
crearElemento("🌹","rose");
},500);

setInterval(()=>{
crearElemento("❤️","heart");
},700);

</script>

</body>
</html>
